services:
  codexmanager-register:
    build:
      context: ..
      dockerfile: docker/Dockerfile.register.local
    image: codexmanager-register-local:latest
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 9000
      HOTMAIL_HANDOFF_ENABLED: "1"
      HOTMAIL_HANDOFF_PORT: "7900"
      HOTMAIL_HANDOFF_PUBLIC_URL: ${HOTMAIL_HANDOFF_PUBLIC_URL:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./codexregister-data:/app/data
      - ./codexregister-logs:/app/logs
    ports:
      - "9000:9000"
      - "7900:7900"

  codexmanager-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service.local
    image: codexmanager-service-local:latest
    restart: unless-stopped
    depends_on:
      - codexmanager-register
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_REGISTER_SERVICE_URL: http://codexmanager-register:9000
      CODEXMANAGER_ACCOUNT_RECOVERY_SOURCE_URL: ${CODEXMANAGER_ACCOUNT_RECOVERY_SOURCE_URL:-http://192.168.5.35:48761}
    volumes:
      - ./codexmanager-data:/data
    ports:
      - "48760:48760"

  codexmanager-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web.local
    image: codexmanager-web-local:latest
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - ./codexmanager-data:/data
    ports:
      - "48761:48761"
