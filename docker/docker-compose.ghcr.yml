services:
  codexmanager-register:
    image: ${GHCR_NAMESPACE:-ghcr.io/jeck5001}/codexmanager-register:${IMAGE_TAG:-latest}
    platform: linux/amd64
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 9000
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./codexregister-data:/app/data
      - ./codexregister-logs:/app/logs
    ports:
      - "9000:9000"

  codexmanager-service:
    image: ${GHCR_NAMESPACE:-ghcr.io/jeck5001}/codexmanager-service:${IMAGE_TAG:-latest}
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - codexmanager-register
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_REGISTER_SERVICE_URL: http://codexmanager-register:9000
    volumes:
      - ./codexmanager-data:/data
    ports:
      - "48760:48760"

  codexmanager-web:
    image: ${GHCR_NAMESPACE:-ghcr.io/jeck5001}/codexmanager-web:${IMAGE_TAG:-latest}
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      codexmanager-service:
        condition: service_healthy
    environment:
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:48761
      CODEXMANAGER_WEB_NO_SPAWN_SERVICE: "1"
      CODEXMANAGER_SERVICE_ADDR: codexmanager-service:48760
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_WEB_NO_OPEN: "1"
    volumes:
      - ./codexmanager-data:/data
    ports:
      - "48761:48761"
